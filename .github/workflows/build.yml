name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        if: matrix.goarch == 'amd64'
        run: go test ./...

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="dev"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          fi
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X ai-sched-cli/internal/app.version=${VERSION}" \
            -o "dist/ai-sched-cli-linux-${GOARCH}" \
            ./cmd/ai-sched-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-sched-cli-linux-${{ matrix.goarch }}
          path: dist/ai-sched-cli-linux-${{ matrix.goarch }}

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: test-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ai-sched-cli-linux-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum ai-sched-cli-linux-* > ai-sched-cli-checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ai-sched-cli-linux-amd64
            dist/ai-sched-cli-linux-arm64
            dist/ai-sched-cli-checksums.txt
