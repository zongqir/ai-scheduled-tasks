name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        if: matrix.goarch == 'amd64'
        run: go test ./...

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/ai-sched-cli-linux-${GOARCH}" ./cmd/ai-sched-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-sched-cli-linux-${{ matrix.goarch }}
          path: dist/ai-sched-cli-linux-${{ matrix.goarch }}
